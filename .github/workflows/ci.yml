name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nim
        uses: alaviss/setup-nim@0.1.1
        with:
          version: devel
          path: 'nim'

      - name: Nim version
        run: nim --version

      - name: Cache nimble
        id: cache-nimble
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install pkg-config libgtk-4-dev libglib2.0-dev libpango1.0-dev libcairo2-dev libfontconfig1-dev libx11-dev libxft-dev libsdl2-dev libsdl2-ttf-dev

      - name: Install SDL3 and SDL2
        run: |
          nimble install https://github.com/nim-lang/sdl3
          nimble install https://github.com/nim-lang/sdl2

      - name: Install dependencies
        run: nimble install -d -y

      - name: Setup nimble paths
        run: nimble setup

      - name: Build
        run: nimble build -d:release -y

      - name: Detect arch
        id: arch
        shell: bash
        run: |
          ARCH=$(uname -m | sed 's/aarch64/arm64/')
          echo "arch=$ARCH" >> $GITHUB_OUTPUT

      - name: Rename binary
        id: rename
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" = "windows" ]; then
            mv drift.exe "drift-${OS}-${{ steps.arch.outputs.arch }}.exe"
            echo "filename=drift-${OS}-${{ steps.arch.outputs.arch }}.exe" >> $GITHUB_OUTPUT
          else
            mv drift "drift-${OS}-${{ steps.arch.outputs.arch }}"
            echo "filename=drift-${OS}-${{ steps.arch.outputs.arch }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ runner.os }}-${{ steps.arch.outputs.arch }}
          path: ${{ steps.rename.outputs.filename }}
